name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check — server
        run: npx tsc --noEmit -p server/tsconfig.json

      - name: TypeScript check — client
        run: npx tsc --noEmit -p client/tsconfig.json

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: mission_planner
          POSTGRES_PASSWORD: mission_secret
          POSTGRES_DB: mission_planning_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mission_planner -d mission_planning_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx -w server prisma generate

      - name: Run database migrations
        run: npx -w server prisma migrate deploy
        env:
          DATABASE_URL: postgresql://mission_planner:mission_secret@localhost:5432/mission_planning_test

      - name: Run unit tests
        run: npm test -w server
        env:
          DATABASE_URL: postgresql://mission_planner:mission_secret@localhost:5432/mission_planning_test
          JWT_SECRET: ci-test-jwt-secret

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx -w server prisma generate

      - name: Build client
        run: npm run build -w client

      - name: Build server
        run: npm run build -w server

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: mission_planner
          POSTGRES_PASSWORD: mission_secret
          POSTGRES_DB: mission_planning_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mission_planner -d mission_planning_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx -w server prisma generate

      - name: Run database migrations
        run: npx -w server prisma migrate deploy
        env:
          DATABASE_URL: postgresql://mission_planner:mission_secret@localhost:5432/mission_planning_test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          DATABASE_URL: postgresql://mission_planner:mission_secret@localhost:5432/mission_planning_test
          JWT_SECRET: ci-test-jwt-secret
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
